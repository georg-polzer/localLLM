<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local LLM Chat</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">Local LLM</div>
        <div class="sidebar-tabs" role="tablist" aria-label="Sidebar sections">
          <button
            id="sidebar-tab-chat"
            class="sidebar-tab active"
            type="button"
            data-tab="chat"
            role="tab"
            aria-selected="true"
            aria-controls="sidebar-panel-chat"
          >
            Chat
          </button>
          <button
            id="sidebar-tab-mcp"
            class="sidebar-tab"
            type="button"
            data-tab="mcp"
            role="tab"
            aria-selected="false"
            aria-controls="sidebar-panel-mcp"
          >
            MCP
          </button>
        </div>

        <div id="sidebar-panel-chat" class="sidebar-panel active" data-panel="chat" role="tabpanel">
          <section class="sidebar-section">
            <div class="section-title">Conversation</div>
            <button id="new-chat" class="new-chat">+ New chat</button>
            <div class="sidebar-copy">
              Start a fresh session while keeping your saved MCP endpoints intact.
            </div>
          </section>
        </div>

        <div id="sidebar-panel-mcp" class="sidebar-panel" data-panel="mcp" role="tabpanel" hidden>
          <section class="sidebar-section">
            <div class="section-title">MCP Endpoints</div>
            <form id="mcp-form" class="mcp-form">
              <input
                id="mcp-endpoint"
                type="url"
                placeholder="https://server.example.com/mcp"
              />
              <button type="submit" class="secondary-button">Add</button>
            </form>
            <div id="mcp-empty" class="empty-state">No MCP endpoints configured.</div>
            <div id="mcp-list" class="mcp-list"></div>
            <button id="refresh-mcp" class="secondary-button" type="button">
              Refresh MCP tools
            </button>
            <div id="mcp-status" class="mcp-status">MCP tools are optional.</div>
          </section>
        </div>
        <div class="hint">Powered by Ollama with a local model and optional MCP grounding.</div>
      </aside>

      <main class="chat-panel">
        <header class="topbar">
          <div>Chat</div>
          <div class="topbar-actions">
            <select id="model-select" class="topbar-select" aria-label="Select model">
              <option>Loading models...</option>
            </select>
            <button id="stop-ollama" class="topbar-button" type="button">Stop Ollama server</button>
            <div id="status" class="status">Checking model...</div>
          </div>
        </header>

        <section id="messages" class="messages"></section>

        <form id="composer" class="composer">
          <textarea
            id="prompt"
            placeholder="Message local model..."
            rows="1"
            required
          ></textarea>
          <button type="submit">Send</button>
        </form>
      </main>
    </div>

    <script>
      window.__CONVERSATION_ID__ = "{{ conversation_id }}";
    </script>
    <script src="/static/app.js?v=20260403-model-picker"></script>
  </body>
</html>
